$kind: http-request
name: API Status
description: "Documentation available in Simple Books API repo README.md:
  [https://github.com/gisbey/simple-books-api-collection/edit/main/README.md#ge\
  t-status--check-api-status.](https://github.com/gisbey/simple-books-api-colle\
  ction/edit/main/README.md#get-status--check-api-status)"
url: "{{baseUrl}}/status"
method: GET
scripts:
  - type: afterResponse
    code: "//
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Config\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      const MAX_RESPONSE_TIME_MS = 500;\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // HTTP Status & Performance Tests\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Status code is 200', () => {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(`HTTP: Response time < ${MAX_RESPONSE_TIME_MS}ms`, () => {\r

      \    pm.expect(pm.response.responseTime, 'Response too slow')\r

      \        .to.be.below(MAX_RESPONSE_TIME_MS);\r

      });\r

      \r

      pm.test('HTTP: Content-Type is JSON', () => {\r

      \    const contentType = pm.response.headers.get('Content-Type');\r

      \    pm.expect(contentType, 'Missing Content-Type header').to.exist;\r

      \    \r

      \    pm.expect(contentType.toLowerCase(), 'Content-Type must include
      application/json')\r

      \        .to.include('application/json');\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Parse Response\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      let response;\r

      \r

      pm.test('Response is valid JSON', () => {\r

      \    pm.expect(pm.response.text(), 'Response body must not be empty')\r

      \        .to.not.be.empty;\r

      \    \r

      \    response = pm.response.json();\r

      \    \r

      \    pm.expect(response, 'Response root must be an object')\r

      \        .to.be.an('object');\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Response Body Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Response \"status\" field is present and valid', () => {\r

      \    pm.expect(response, 'Response must include status')\r

      \        .to.have.property('status');\r

      \r

      \    pm.expect(response.status, 'Status must be a string')\r

      \        .to.be.a('string');\r

      \r

      \    pm.expect(response.status, 'Status must equal \"OK\"')\r

      \        .to.eql('OK');\r

      });\r\n"
    language: text/javascript
order: 1000
