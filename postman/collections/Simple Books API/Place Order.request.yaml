$kind: http-request
name: Place Order
description: "Documentation available in Simple Books API repo README.md:
  [https://github.com/gisbey/simple-books-api-collection/edit/main/README.md#po\
  st-orders--place-order](https://github.com/gisbey/simple-books-api-collection\
  /edit/main/README.md#post-orders--place-order)."
url: "{{baseUrl}}/orders"
method: POST
body:
  type: json
  content: "{\r

    \  \"bookId\": {{bookId}},\r

    \  \"customerName\": \"{{$randomFullName}}\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: "//
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Config\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      const MAX_RESPONSE_TIME_MS = 500;\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // HTTP Status & Performance Tests\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test('Status code is 201', () => {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      pm.test(`HTTP: Response time < ${MAX_RESPONSE_TIME_MS}ms`, () => {\r

      \    pm.expect(pm.response.responseTime, 'Response too slow')\r

      \        .to.be.below(MAX_RESPONSE_TIME_MS);\r

      });\r

      \r

      pm.test('HTTP: Content-Type is JSON', () => {\r

      \    const contentType = pm.response.headers.get('Content-Type');\r

      \    \r

      \    pm.expect(contentType, 'Missing Content-Type header').to.exist;\r

      \    \r

      \    pm.expect(contentType.toLowerCase(), 'Content-Type must include
      application/json')\r

      \        .to.include('application/json');\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Parse Response\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      let response;\r

      \r

      pm.test('Response is valid JSON', () => {\r

      \    pm.expect(pm.response.text(), 'Response body must not be empty')\r

      \        .to.not.be.empty;\r

      \    \r

      \    response = pm.response.json();\r

      \    \r

      \    pm.expect(response, 'Response root must be an object')\r

      \        .to.be.an('object');\r

      });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Export Variables\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.collectionVariables.set(\"orderId\", response.orderId);\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Response Body Validation\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test(\"Response fields are valid\", () => {\r

      \    pm.expect(response, 'Created must be a boolean')\r

      \        .to.have.property('created')\r

      \        .that.is.a('boolean')\r

      \    \r

      \    pm.expect(response, 'Order ID must be 21 chars: alphanumeric,
      hyphens, underscores')\r

      \        .to.have.property('orderId')\r

      \        .that.is.a('string')\r

      \        .to.match(/^[A-Za-z0-9-_]{21}$/);\r

      \    });\r

      \r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      // Business Logic Tests\r

      //
      ─────────────────────────────────────────────────────────────────────────\
      ────\r

      \r

      pm.test(\"Order created\", () => {\r

      \    pm.expect(response.created, 'Created must be true')\r

      \        .to.eql(true);\r

      \    \r

      \    pm.expect(response.orderId, 'Order ID must match orderId collection
      variable')\r

      \        .to.eql(pm.collectionVariables.get(\"orderId\"));\r

      });\r\n"
    language: text/javascript
order: 5000
